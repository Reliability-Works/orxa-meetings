[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  "backend",
  "frontend",
  ".venv",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.coverage.run]
branch = true
source = ["mcp"]
omit = ["mcp/test_*.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
]
